<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>JSF Bedrock Példa</title>
</h:head>
<h:body>
    <h2>Egyszerű JSF Alkalmazás</h2>
    <h:form>
        <h:outputLabel for="nameInput" value="Írd be a neved: " />
        <h:inputText id="nameInput" value="#{helloBean.name}" />
        <h:commandButton value="Köszönj!" action="#{helloBean.greetings}" />
    </h:form>
    <br/>
    <h:outputText value="#{helloBean.name}" style="font-weight:bold; color:blue;" />
</h:body>
</html>
